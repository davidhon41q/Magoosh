<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hover Landing Page</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    line-height: 1.6;
}

/* HEADER */
header {
    background: #111827;
    color: white;
    padding: 20px 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    position: relative;
}

/* NAV HOVER UNDERLINE */
nav a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    background: #6366f1;
    left: 0;
    bottom: -5px;
    transition: 0.3s;
}

nav a:hover::after {
    width: 100%;
}

/* HERO */
.hero {
    background: linear-gradient(to right, #6366f1, #4f46e5);
    color: white;
    text-align: center;
    padding: 100px 20px;
}

.hero h1 {
    font-size: 42px;
}

.hero p {
    margin: 20px 0;
}

.hero button {
    padding: 12px 25px;
    border: none;
    background: white;
    color: #4f46e5;
    font-weight: bold;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}

/* BUTTON HOVER */
.hero button:hover {
    background: #111827;
    color: white;
    transform: scale(1.05);
}

/* FEATURES */
.features {
    padding: 60px 20px;
    text-align: center;
}

.feature-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-top: 30px;
}

.feature {
    background: #f9f9f9;
    padding: 25px;
    border-radius: 10px;
    transition: 0.3s;
}

/* CARD HOVER EFFECT */
.feature:hover {
    transform: translateY(-10px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* FOOTER */
footer {
    background: #111827;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<header>
    <h2>Brand</h2>
    <nav>
        <a href="#">Home</a>
        <a href="#">Features</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Build Modern Websites</h1>
    <p>Create beautiful landing pages with smooth hover effects.</p>
    <button>Get Started</button>
</section>

<section class="features">
    <h2>Our Features</h2>
    <div class="feature-grid">
        <div class="feature">
            <h3>Fast</h3>
            <p>Optimized performance for speed.</p>
        </div>
        <div class="feature">
            <h3>Responsive</h3>
            <p>Works on all devices seamlessly.</p>
        </div>
        <div class="feature">
            <h3>Modern UI</h3>
            <p>Clean and professional design.</p>
        </div>
    </div>
</section>

<footer>
    <p>© 2026 Brand. All rights reserved.</p>
</footer>

</body>
</html>
